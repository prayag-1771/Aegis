<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aegis Fraud Shield — live scam check</title>
<link rel="icon" type="image/png" href="/favicon.png">
<script src="/config.js"></script>
<style>
  :root {
    --bg: #09090b;
    --panel: rgba(24, 24, 27, 0.7);
    --panel-2: rgba(39, 39, 42, 0.7);
    --text: #fafafa;
    --muted: #a1a1aa;
    --line: rgba(255, 255, 255, 0.08);
    --scam: #ef4444;
    --suspicious: #f59e0b;
    --legit: #10b981;
    --accent: #8b5cf6;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font: 15px/1.5 "Segoe UI", system-ui, sans-serif;
    background-color: var(--bg);
    background-image:
      radial-gradient(1200px 600px at 15% -10%, rgba(139, 92, 246, 0.05), transparent 60%),
      radial-gradient(900px 500px at 100% 10%, rgba(248, 113, 113, 0.03), transparent 55%);
    background-attachment: fixed;
    color: var(--text);
    display: flex; flex-direction: column; height: 100vh;
  }

  ::selection {
    background: rgba(167, 139, 250, 0.35);
    color: #fff;
  }
  :focus-visible {
    outline: 2px solid rgba(167, 139, 250, 0.7);
    outline-offset: 2px;
    border-radius: 4px;
  }

  /* ── SCROLLBAR — hidden by default, subtle on hover ── */
  * {
    scrollbar-width: thin;
    scrollbar-color: transparent transparent;
  }
  *:hover {
    scrollbar-color: rgba(255,255,255,0.12) transparent;
  }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: transparent;
    border-radius: 3px;
    transition: background 0.3s;
  }
  *:hover::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); }
  *:hover::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px; background: var(--panel); border-bottom: 1px solid var(--line);
  }
  header .logo { width: 30px; height: 30px; display: block; }
  header h1 { font-size: 17px; font-weight: 600; }
  header .sub { color: var(--muted); font-size: 12.5px; }
  .tabs { display: flex; gap: 6px; margin-left: 18px; }
  .tabs a { font-size: 12.5px; padding: 5px 12px; border-radius: 999px; color: var(--muted);
            text-decoration: none; border: 1px solid transparent; }
  .tabs a:hover { color: var(--text); }
  .tabs a.active { background: var(--panel-2); border-color: var(--line); color: var(--text); }
  #status {
    margin-left: auto; font-size: 12px; padding: 4px 10px; border-radius: 999px;
    background: var(--panel-2); color: var(--muted); border: 1px solid var(--line);
  }
  #status.ok { color: var(--legit); border-color: var(--legit); }
  #log { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .msg { max-width: 720px; padding: 12px 16px; border-radius: 14px; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .msg.bot { align-self: flex-start; background: var(--panel); border: 1px solid var(--line); border-bottom-left-radius: 4px; }
  .verdict { display: inline-block; font-weight: 700; font-size: 13px; letter-spacing: .06em;
             text-transform: uppercase; padding: 3px 10px; border-radius: 6px; margin-bottom: 8px; }
  .verdict.scam { background: rgba(255,89,100,.15); color: var(--scam); border: 1px solid var(--scam); }
  .verdict.suspicious { background: rgba(255,176,32,.12); color: var(--suspicious); border: 1px solid var(--suspicious); }
  .verdict.legit { background: rgba(47,191,113,.12); color: var(--legit); border: 1px solid var(--legit); }
  .riskbar { height: 6px; border-radius: 3px; background: var(--panel-2); margin: 8px 0; overflow: hidden; }
  .riskbar > div { height: 100%; border-radius: 3px; transition: width .6s ease; }
  .meta { color: var(--muted); font-size: 12.5px; margin-top: 6px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .chip { font-size: 11.5px; padding: 2px 9px; border-radius: 999px;
          background: var(--panel-2); border: 1px solid var(--line); color: var(--muted); }
  .explain { margin-top: 8px; font-size: 13.5px; }

  /* ── Report Payment button + form ── */
  .report-payment-btn {
    display: inline-flex; align-items: center; gap: 6px; margin-top: 10px;
    padding: 7px 14px; border-radius: 8px; cursor: pointer; font: inherit; font-size: 12.5px;
    font-weight: 600; border: 1px solid var(--scam);
    background: rgba(255,89,100,.1); color: var(--scam);
    transition: all .2s;
  }
  .report-payment-btn:hover { background: rgba(255,89,100,.2); transform: translateY(-1px); }
  .report-payment-btn.done { border-color: var(--legit); color: var(--legit);
    background: rgba(47,191,113,.1); cursor: default; pointer-events: none; }
  .payment-form {
    display: none; margin-top: 12px; padding: 18px 22px; border-radius: 12px;
    background: linear-gradient(145deg, rgba(39, 39, 42, 0.8) 0%, rgba(24, 24, 27, 0.9) 100%);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    backdrop-filter: blur(12px);
    white-space: normal;
    animation: slideDown .3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .payment-form.open { display: block; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  .payment-form label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); display: block; margin-bottom: 6px; font-weight: 600; }
  .payment-form .form-row { display: flex; gap: 12px; align-items: flex-start; flex-wrap: wrap; }
  
  .payment-form .input-group {
    display: flex; flex-direction: column;
  }
  .payment-form input[type="hidden"] {
    display: none !important;
  }
  
  /* Custom Number Spinner */
  .custom-number-wrapper {
    display: flex; align-items: center;
    background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; overflow: hidden; transition: all 0.2s ease;
  }
  .custom-number-wrapper:hover { background: rgba(0, 0, 0, 0.6); border-color: rgba(255,255,255,0.25); }
  .custom-number-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2); }
  .payment-form .custom-number-wrapper input[type=number] {
    width: 90px; border: none; background: transparent; padding: 9px 5px; text-align: center; box-shadow: none;
    color: var(--text); font: inherit; font-size: 13px; outline: none;
  }
  .payment-form .custom-number-wrapper input[type=number]::-webkit-inner-spin-button,
  .payment-form .custom-number-wrapper input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  .spin-btn {
    background: transparent; color: var(--muted); border: none; padding: 0 14px; cursor: pointer;
    font-size: 18px; line-height: 1; font-weight: 400; align-self: stretch; transition: all 0.2s;
  }
  .spin-btn:hover { color: var(--text); background: rgba(255,255,255,0.08); }
  .spin-btn:active { background: rgba(255,255,255,0.12); }

  /* Custom Select Dropdown */
  .custom-select-wrapper {
    position: relative; min-width: 150px; outline: none;
  }
  .custom-select-display {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(0, 0, 0, 0.4); color: var(--text); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; padding: 9px 14px; font-size: 13px; cursor: pointer; transition: all 0.2s ease;
  }
  .custom-select-wrapper:hover .custom-select-display { background: rgba(0, 0, 0, 0.6); border-color: rgba(255,255,255,0.25); }
  .custom-select-wrapper.open .custom-select-display { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2); }
  .custom-select-display svg { width: 14px; height: 14px; fill: currentColor; opacity: 0.7; transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
  .custom-select-wrapper.open .custom-select-display svg { transform: rotate(180deg); }
  
  .custom-select-options {
    position: absolute; top: calc(100% + 6px); left: 0; width: 100%;
    background: rgba(30, 30, 34, 0.95); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    backdrop-filter: blur(12px); overflow: hidden; z-index: 10;
    opacity: 0; transform: translateY(-8px) scale(0.98); pointer-events: none;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .custom-select-wrapper.open .custom-select-options {
    opacity: 1; transform: translateY(0) scale(1); pointer-events: auto;
  }
  .custom-select-options div {
    padding: 8px 14px; font-size: 13px; color: var(--text); cursor: pointer; transition: background 0.15s;
  }
  .custom-select-options div:hover { background: rgba(139, 92, 246, 0.3); }
  
  .payment-form .submit-payment {
    padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer;
    background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
    color: #fff; font: inherit; font-size: 13px; font-weight: 600;
    box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
    transition: all .2s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .payment-form .submit-payment:hover { 
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(239, 68, 68, 0.4);
    filter: brightness(1.1);
  }
  .payment-form .submit-payment:active {
    transform: translateY(0);
  }
  .payment-form .submit-payment:disabled {
    opacity: 0.5; cursor: not-allowed; filter: grayscale(0.5);
    transform: none; box-shadow: none;
  }

  /* Method-specific detail fields */
  .method-details {
    overflow: hidden; transition: max-height 0.35s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s ease;
    max-height: 0; opacity: 0;
  }
  .method-details.visible { max-height: 500px; opacity: 1; }
  .method-details .detail-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px;
    margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.06);
    animation: slideDown 0.3s ease;
  }
  .method-details .detail-grid.single-col { grid-template-columns: 1fr; }
  .method-details .detail-field label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--muted); display: block; margin-bottom: 4px; font-weight: 600;
  }
  .method-details .detail-field input,
  .method-details .detail-field textarea {
    width: 100%; background: rgba(0, 0, 0, 0.4); color: var(--text);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
    padding: 8px 12px; font: inherit; font-size: 12.5px; transition: all 0.2s;
    outline: none; resize: none;
  }
  .method-details .detail-field input:hover,
  .method-details .detail-field textarea:hover {
    background: rgba(0,0,0,0.6); border-color: rgba(255,255,255,0.2);
  }
  .method-details .detail-field input:focus,
  .method-details .detail-field textarea:focus {
    border-color: var(--accent); box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.15);
  }
  .method-details .detail-field input::placeholder,
  .method-details .detail-field textarea::placeholder {
    color: rgba(161, 161, 170, 0.5);
  }
  .method-details .section-hint {
    grid-column: 1 / -1; font-size: 11px; color: rgba(161,161,170,0.7);
    margin-top: -2px; display: flex; align-items: center; gap: 5px;
  }
  .method-details .section-hint svg { width: 12px; height: 12px; fill: currentColor; opacity: 0.6; }

  .form-actions {
    margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06);
  }

  .payment-trail {
    margin-top: 8px; padding: 8px 12px; border-radius: 8px;
    background: rgba(255,89,100,.08); border: 1px solid rgba(255,89,100,.2);
    font-size: 12.5px; color: var(--text);
    animation: slideDown .3s ease;
  }
  .payment-trail .trail-status { color: var(--scam); font-weight: 600; }
  .payment-trail.found .trail-status { color: var(--legit); }

  footer { padding: 14px 20px 18px; background: var(--panel); border-top: 1px solid var(--line); }
  .samples { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .samples button {
    font-size: 12px; padding: 5px 11px; border-radius: 999px; cursor: pointer;
    background: var(--panel-2); color: var(--muted); border: 1px solid var(--line);
  }
  .samples button:hover { color: var(--text); border-color: var(--accent); }
  .inputrow { display: flex; gap: 10px; }
  select, textarea, .send {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
    border-radius: 10px; font: inherit;
  }
  select { padding: 0 10px; }
  textarea { flex: 1; padding: 10px 14px; resize: none; height: 66px; }
  textarea:focus { outline: none; border-color: var(--accent); }
  .send { padding: 0 22px; cursor: pointer; background: var(--accent); color: #fff; border: none; font-weight: 600; }
  .send:disabled { opacity: .5; cursor: wait; }
</style>
</head>
<body>
<header>
  <img class="logo" alt="Aegis" width="30" height="30" src="/favicon.png">
  <div>
    <h1>Aegis Fraud Shield</h1>
    <div class="sub">Paste or read out any message / call script — watch it get checked live</div>
  </div>
  <nav class="tabs">
    <a class="active" href="/">💬 Message check</a>
    <a href="/live-call">📞 Live call</a>
    <a href="/whatsapp">🟢 WhatsApp</a>
  </nav>
  <span id="status">connecting…</span>
</header>

<div id="log"></div>

<footer>
  <div class="samples" id="samples"></div>
  <div class="inputrow">
    <select id="source">
      <option value="manual_demo">demo</option>
      <option value="sms">sms</option>
      <option value="call_transcript">call</option>
      <option value="whatsapp">whatsapp</option>
      <option value="email">email</option>
    </select>
    <input type="hidden" id="gpsLat">
    <input type="hidden" id="gpsLon">
    <input type="hidden" id="gpsDistrict">
    <textarea id="text" placeholder="Type or paste the message here… (Enter to send, Shift+Enter for newline)"></textarea>
    <button class="send" id="send">Check</button>
  </div>
</footer>

<script>
const SAMPLES = [
  ["🚨 Digital-arrest call", "call_transcript", "This is Inspector Sharma from CBI. An FIR has been registered against your Aadhaar for money laundering. Stay on this video call and do not disconnect. Transfer the verification amount in USDT immediately or a warrant will be issued."],
  ["📱 KYC scam SMS", "sms", "Dear customer your SBI account KYC has expired. Account will be blocked within 24 hours. Update immediately at bit.ly/kyc-upd8 to avoid suspension."],
  ["🎰 Lottery bait", "whatsapp", "Congratulations! Your mobile number has won Rs 25,00,000 in the KBC Lucky Draw. To claim your prize deposit the processing fee of Rs 12,500 and share your bank details."],
  ["✅ Genuine OTP", "sms", "482913 is your OTP for HDFC net banking login. Valid for 10 minutes. Do not share this OTP with anyone."],
  ["💬 Normal chat", "whatsapp", "Hey, are we still meeting for lunch tomorrow at 1pm? Let me know if you want to move it."],
];

const log = document.getElementById("log");
const input = document.getElementById("text");
const sendBtn = document.getElementById("send");
const sourceSel = document.getElementById("source");
const gpsLat = document.getElementById("gpsLat");
const gpsLon = document.getElementById("gpsLon");
const gpsDistrict = document.getElementById("gpsDistrict");
const statusEl = document.getElementById("status");

// Command centre to auto-ingest detections into (dashboard + fusion).
const COMMAND_CENTRE = window.AEGIS_COMMAND_CENTRE || "http://127.0.0.1:8000";
// Demo geography shared with fraud-graph + fusion (see fusion/correlator.py).
const DISTRICT_COORDS = {
  // Jamtara town centre. 23.79 fell ~19 km south, on Maithon reservoir.
  "Jamtara": [23.963, 86.804], "Deoghar": [24.48, 86.70], "Alwar": [27.55, 76.63],
  "Bharatpur": [27.22, 77.49], "Nuh": [28.10, 77.00], "Chennai Central": [13.08, 80.27],
  "Mumbai South": [18.93, 72.83], "Delhi East": [28.65, 77.30],
};

const VERDICT_COLOR = { scam: "var(--scam)", suspicious: "var(--suspicious)", legit: "var(--legit)" };

fetch("/health").then(r => r.json()).then(h => {
  statusEl.textContent = h.model_trained ? "model ready" : "model NOT trained";
  if (h.model_trained) statusEl.classList.add("ok");
}).catch(() => { statusEl.textContent = "api offline"; });

for (const [label, source, text] of SAMPLES) {
  const b = document.createElement("button");
  b.textContent = label;
  b.onclick = () => { input.value = text; sourceSel.value = source; input.focus(); };
  document.getElementById("samples").appendChild(b);
}

function bubble(cls, html) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerHTML = html;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  return div;
}

const esc = s => s.replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

async function requestLocation() {
  if (gpsLat.value) return; // already have it
  return new Promise(resolve => {
    navigator.geolocation.getCurrentPosition(
      pos => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        gpsLat.value = lat;
        gpsLon.value = lon;
        let bestDist = "Unknown District";
        let minD = Infinity;
        for (const [d, coords] of Object.entries(DISTRICT_COORDS)) {
          const dist = Math.hypot(lat - coords[0], lon - coords[1]);
          if (dist < minD) { minD = dist; bestDist = d; }
        }
        if (minD > 2.0) bestDist = "Current Location";
        gpsDistrict.value = bestDist;
        resolve(true);
      },
      err => { resolve(false); }
    );
  });
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  bubble("user", esc(text));
  input.value = "";
  sendBtn.disabled = true;
  const thinking = bubble("bot", "Analysing…");
  try {
    await requestLocation();
    
    let location_hint = null;
    if (gpsLat.value && gpsLon.value) {
      location_hint = { district: gpsDistrict.value, lat: parseFloat(gpsLat.value), lon: parseFloat(gpsLon.value) };
    }
    const resp = await fetch("/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, source: sourceSel.value, location_hint }),
    });
    if (!resp.ok) throw new Error((await resp.json()).detail || resp.statusText);
    const r = await resp.json();
    // Fire-and-forget hand-off: the dashboard + fusion see this detection
    // live. Failure is non-fatal — the local demo keeps working regardless.
    let relayed = false;
    if (r.verdict !== 'legit') {
      try {
        const ing = await fetch(`${COMMAND_CENTRE}/ingest/scam`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(r),
        });
        relayed = ing.ok;
      } catch { /* command centre offline — fine */ }
    }
    const pct = Math.round(r.risk_score * 100);
    const color = VERDICT_COLOR[r.verdict];
    const isScammy = r.verdict === 'scam' || r.verdict === 'suspicious';
    const formId = 'pf_' + r.event_id;
    thinking.innerHTML = `
      <span class="verdict ${r.verdict}">${r.verdict}</span>
      <div class="riskbar"><div style="width:${pct}%;background:${color}"></div></div>
      <div class="meta">risk ${pct}% · type: ${esc(r.scam_type)} · ${esc(r.event_id)}${relayed ? " · ⇢ command centre" : ""}</div>
      ${r.markers.length ? `<div class="chips">${r.markers.map(m => `<span class="chip">${esc(m)}</span>`).join("")}</div>` : ""}
      <div class="explain">${esc(r.explanation)}</div>
      ${isScammy ? `
        <button class="report-payment-btn" id="rpb_${formId}" onclick="togglePaymentForm('${formId}')">
          💰 Report Payment — Did you pay?
        </button>
        <div class="payment-form" id="${formId}">
          <div class="form-row">
            <div class="input-group"><label>Amount paid (₹)</label><div class="custom-number-wrapper"><button type="button" class="spin-btn" onclick="spinNumber('${formId}', -1000)">−</button><input type="number" id="amt_${formId}" placeholder="e.g. 49999" min="1" step="1"><button type="button" class="spin-btn" onclick="spinNumber('${formId}', 1000)">+</button></div></div>
            <div class="input-group"><label>Method</label><div class="custom-select-wrapper" id="method_wrapper_${formId}" tabindex="0" onblur="closeDropdown('${formId}')"><div class="custom-select-display" onclick="toggleDropdown('${formId}')"><span id="method_display_${formId}">Select method…</span><svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg></div><div class="custom-select-options"><div onclick="selectMethod('${formId}', 'bank_transfer', '🏦 Bank Transfer')">🏦 Bank Transfer</div><div onclick="selectMethod('${formId}', 'upi', '📱 UPI')">📱 UPI</div><div onclick="selectMethod('${formId}', 'cash', '💵 Cash')">💵 Cash</div><div onclick="selectMethod('${formId}', 'giftcard', '🎁 Gift Card')">🎁 Gift Card</div><div onclick="selectMethod('${formId}', 'crypto', '₿ Crypto')">₿ Crypto</div><div onclick="selectMethod('${formId}', 'other', '📝 Other')">📝 Other</div></div><input type="hidden" id="method_${formId}" value=""></div></div>
          </div>
          <div class="method-details" id="details_${formId}"></div>
          <div class="form-actions"><button class="submit-payment" id="submit_${formId}" onclick="submitPayment('${formId}', '${r.event_id}')" disabled>Select a method to continue</button></div>
        </div>
        <div id="trail_${formId}"></div>
      ` : ''}`;
    // Store the result so we can attach payment info later
    if (isScammy) window['_scam_' + r.event_id] = r;
  } catch (e) {
    thinking.innerHTML = `<span style="color:var(--scam)">Error:</span> ${esc(String(e.message || e))}`;
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

sendBtn.onclick = send;
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

function togglePaymentForm(formId) {
  const form = document.getElementById(formId);
  form.classList.toggle('open');
  if (form.classList.contains('open')) {
    const amtInput = document.getElementById('amt_' + formId);
    if (amtInput) amtInput.focus();
  }
}

// ESC closes any open payment form
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.payment-form.open').forEach(f => f.classList.remove('open'));
  }
});

      { id: 'victim_bank', label: 'Your Bank', placeholder: 'e.g. SBI, HDFC, ICICI' },
      { id: 'scammer_bank', label: "Scammer's Bank", placeholder: 'e.g. SBI, HDFC, ICICI' },
      { id: 'victim_ifsc', label: 'Your IFSC', placeholder: 'e.g. SBIN0001234' },
      { id: 'scammer_ifsc', label: "Scammer's IFSC", placeholder: 'e.g. HDFC0001234' },
      { id: 'transaction_id', label: 'UTR / Ref Number', placeholder: 'Transaction reference (if available)', colspan: true },
    ]
  },
  upi: {
    hint: 'UPI IDs let us instantly flag the scammer across all payment apps',
    fields: [
      { id: 'victim_account', label: 'Your UPI ID', placeholder: 'e.g. yourname@upi', required: true },
      { id: 'scammer_account', label: "Scammer's UPI ID", placeholder: 'e.g. scammer@ybl', required: true },
      { id: 'transaction_id', label: 'UPI Ref / UTR Number', placeholder: 'Transaction reference (if available)', colspan: true },
    ]
  },
  cash: {
    hint: 'Location details help law enforcement trace the cash handover point',
    singleCol: true,
    fields: [
      { id: 'cash_location', label: 'Handover Location', placeholder: 'Where was the cash handed over? (address / landmark)', type: 'textarea', required: true },
      { id: 'notes', label: 'Additional Details', placeholder: 'Person description, vehicle details, any other info…', type: 'textarea' },
    ]
  },
  giftcard: {
    hint: 'Gift card codes can be frozen before the scammer redeems them',
    fields: [
      { id: 'giftcard_platform', label: 'Gift Card Platform', placeholder: 'e.g. Amazon, Google Play, iTunes', required: true },
      { id: 'giftcard_code', label: 'Gift Card Code / Number', placeholder: 'The code you shared with the scammer', required: true },
      { id: 'notes', label: 'Additional Details', placeholder: 'Number of cards, total value breakdown…', colspan: true },
    ]
  },
  crypto: {
    hint: 'Wallet addresses and transaction hashes are permanently recorded on the blockchain',
    fields: [

function renderMethodFields(formId, method) {
  const container = document.getElementById('details_' + formId);
  const submitBtn = document.getElementById('submit_' + formId);
  const config = METHOD_FIELDS[method];
  if (!config) {
    container.innerHTML = '';
    container.classList.remove('visible');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Select a method to continue';
    return;
  }

  let html = `<div class="detail-grid${config.singleCol ? ' single-col' : ''}">`;
  html += `<div class="section-hint"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>${config.hint}</div>`;

  for (const f of config.fields) {
    const colSpan = f.colspan ? ' style="grid-column:1/-1"' : '';
    const req = f.required ? ' <span style="color:var(--scam)">*</span>' : '';
    if (f.type === 'textarea') {
      html += `<div class="detail-field"${colSpan}><label>${f.label}${req}</label><textarea id="df_${f.id}_${formId}" placeholder="${f.placeholder}" rows="2"${f.required ? ' required' : ''}></textarea></div>`;
    } else {
      html += `<div class="detail-field"${colSpan}><label>${f.label}${req}</label><input type="text" id="df_${f.id}_${formId}" placeholder="${f.placeholder}"${f.required ? ' required' : ''}></div>`;
    }
  }
  html += '</div>';
  container.innerHTML = html;

  // Animate in
  requestAnimationFrame(() => container.classList.add('visible'));

  // Enable submit
  submitBtn.disabled = false;
  submitBtn.textContent = 'Trace Money →';
}

function collectMethodDetails(formId, method) {
  const config = METHOD_FIELDS[method];
  if (!config) return {};
  const details = {};
  for (const f of config.fields) {
    const el = document.getElementById('df_' + f.id + '_' + formId);
    if (el && el.value.trim()) {
      details[f.id] = el.value.trim();
    }
  }
  return details;
}

function validateMethodDetails(formId, method) {
  const config = METHOD_FIELDS[method];
  if (!config) return false;
  for (const f of config.fields) {
    if (!f.required) continue;
    const el = document.getElementById('df_' + f.id + '_' + formId);
    if (!el || !el.value.trim()) {
      el.style.borderColor = 'var(--scam)';
      el.focus();
      setTimeout(() => { el.style.borderColor = ''; }, 2000);
      return false;
    }
  }
  return true;
}

async function submitPayment(formId, eventId) {
  const amtInput = document.getElementById('amt_' + formId);
  const methodSel = document.getElementById('method_' + formId);
  const trailDiv = document.getElementById('trail_' + formId);
  const btn = document.getElementById('rpb_' + formId);
  const amount = parseFloat(amtInput.value);
  if (!amount || amount <= 0) { amtInput.style.borderColor = 'var(--scam)'; return; }

  const method = methodSel.value;
  if (!method) return;

  // Validate required method-specific fields
  if (!validateMethodDetails(formId, method)) return;

  const stored = window['_scam_' + eventId];
  if (!stored) return;

  // Collect all method-specific details
  const details = collectMethodDetails(formId, method);

  // Attach reported_payment with full details to the scam event
  stored.reported_payment = { amount, method, ...details };

  // Update button
  const methodLabel = document.getElementById('method_display_' + formId).innerText;
  btn.innerHTML = `✅ Reported ₹${amount.toLocaleString('en-IN')} via ${methodLabel}`;
  btn.classList.add('done');
  document.getElementById(formId).classList.remove('open');

  // Show "tracing..." message
  trailDiv.innerHTML = '<div class="payment-trail"><span class="trail-status">🔍 Tracing payment through fraud rings…</span></div>';

  // Re-send to command centre with payment info
  try {
    const resp = await fetch(`${COMMAND_CENTRE}/ingest/scam`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(stored),
    });
    if (resp.ok) {
      // Force the command centre to re-run fusion with the new payment data
      try {
        const fusionResp = await fetch(`${COMMAND_CENTRE}/fuse`, { method: 'POST' });
        if (fusionResp.ok) {
          const fusion = await fusionResp.json();
          const trails = fusion.money_trails || [];
          const match = trails.find(t => t.scam_event_id === eventId);
          if (match) {
            trailDiv.innerHTML = `<div class="payment-trail found">
              <span class="trail-status">💰 MONEY TRAIL FOUND</span><br>
              ₹${amount.toLocaleString('en-IN')} traced → account <b>${esc(match.account_id)}</b>
              in ring <b>${esc(match.ring_id)}</b>${match.district ? ' (' + esc(match.district) + ')' : ''}
            </div>`;
          } else {
            trailDiv.innerHTML = `<div class="payment-trail">
              <span class="trail-status">⇢ Payment reported to command centre</span><br>
              No matching ring transaction found yet — investigators notified.
            </div>`;
          }
        }
      } catch { /* fusion endpoint unavailable */ }
    } else {
      trailDiv.innerHTML = `<div class="payment-trail">
        <span class="trail-status">⇢ Payment reported</span><br>
        Command centre offline — payment saved locally for later relay.
      </div>`;
    }
  } catch {
    trailDiv.innerHTML = `<div class="payment-trail">
      <span class="trail-status">⇢ Payment recorded</span><br>
      Command centre offline — will relay when available.
    </div>`;
  }
}

function toggleDropdown(formId) {
  const wrapper = document.getElementById('method_wrapper_' + formId);
  wrapper.classList.toggle('open');
}
function closeDropdown(formId) {
  setTimeout(() => {
    const wrapper = document.getElementById('method_wrapper_' + formId);
    if(wrapper) wrapper.classList.remove('open');
  }, 150);
}
function selectMethod(formId, val, label) {
  document.getElementById('method_' + formId).value = val;
  document.getElementById('method_display_' + formId).innerText = label;
  closeDropdown(formId);
  renderMethodFields(formId, val);
}
function spinNumber(formId, amount) {
  const input = document.getElementById('amt_' + formId);
  let val = parseInt(input.value) || 0;
  val = Math.max(1, val + amount);
  input.value = val;
}
