<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aegis Fraud Shield — live scam check</title>
<style>
  :root {
    --bg: #0b1020; --panel: #131a2e; --panel-2: #1a2340; --text: #e8ecf6;
    --muted: #93a0bd; --line: #26304f;
    --scam: #ff5964; --suspicious: #ffb020; --legit: #2fbf71; --accent: #5b8cff;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font: 15px/1.5 "Segoe UI", system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; height: 100vh;
  }

  /* ── SCROLLBAR — hidden by default, subtle on hover ── */
  * {
    scrollbar-width: thin;
    scrollbar-color: transparent transparent;
  }
  *:hover {
    scrollbar-color: rgba(255,255,255,0.12) transparent;
  }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: transparent;
    border-radius: 3px;
    transition: background 0.3s;
  }
  *:hover::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); }
  *:hover::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px; background: var(--panel); border-bottom: 1px solid var(--line);
  }
  header .logo { font-size: 22px; }
  header h1 { font-size: 17px; font-weight: 600; }
  header .sub { color: var(--muted); font-size: 12.5px; }
  #status {
    margin-left: auto; font-size: 12px; padding: 4px 10px; border-radius: 999px;
    background: var(--panel-2); color: var(--muted); border: 1px solid var(--line);
  }
  #status.ok { color: var(--legit); border-color: var(--legit); }
  #log { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .msg { max-width: 720px; padding: 12px 16px; border-radius: 14px; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .msg.bot { align-self: flex-start; background: var(--panel); border: 1px solid var(--line); border-bottom-left-radius: 4px; }
  .verdict { display: inline-block; font-weight: 700; font-size: 13px; letter-spacing: .06em;
             text-transform: uppercase; padding: 3px 10px; border-radius: 6px; margin-bottom: 8px; }
  .verdict.scam { background: rgba(255,89,100,.15); color: var(--scam); border: 1px solid var(--scam); }
  .verdict.suspicious { background: rgba(255,176,32,.12); color: var(--suspicious); border: 1px solid var(--suspicious); }
  .verdict.legit { background: rgba(47,191,113,.12); color: var(--legit); border: 1px solid var(--legit); }
  .riskbar { height: 6px; border-radius: 3px; background: var(--panel-2); margin: 8px 0; overflow: hidden; }
  .riskbar > div { height: 100%; border-radius: 3px; transition: width .6s ease; }
  .meta { color: var(--muted); font-size: 12.5px; margin-top: 6px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .chip { font-size: 11.5px; padding: 2px 9px; border-radius: 999px;
          background: var(--panel-2); border: 1px solid var(--line); color: var(--muted); }
  .explain { margin-top: 8px; font-size: 13.5px; }

  /* ── Report Payment button + form ── */
  .report-payment-btn {
    display: inline-flex; align-items: center; gap: 6px; margin-top: 10px;
    padding: 7px 14px; border-radius: 8px; cursor: pointer; font: inherit; font-size: 12.5px;
    font-weight: 600; border: 1px solid var(--scam);
    background: rgba(255,89,100,.1); color: var(--scam);
    transition: all .2s;
  }
  .report-payment-btn:hover { background: rgba(255,89,100,.2); transform: translateY(-1px); }
  .report-payment-btn.done { border-color: var(--legit); color: var(--legit);
    background: rgba(47,191,113,.1); cursor: default; pointer-events: none; }
  .payment-form {
    display: none; margin-top: 10px; padding: 10px 14px; border-radius: 10px;
    background: var(--panel-2); border: 1px solid var(--line);
    animation: slideDown .25s ease;
  }
  .payment-form.open { display: block; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .payment-form label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 3px; }
  .payment-form .form-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
  .payment-form input, .payment-form select {
    background: var(--bg); color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; padding: 7px 10px; font: inherit; font-size: 13px;
  }
  .payment-form input:focus { outline: none; border-color: var(--accent); }
  .payment-form input[type=number] { width: 150px; }
  .payment-form .submit-payment {
    padding: 7px 16px; border-radius: 8px; border: none; cursor: pointer;
    background: var(--scam); color: #fff; font: inherit; font-size: 12.5px; font-weight: 600;
    transition: all .2s;
  }
  .payment-form .submit-payment:hover { filter: brightness(1.15); }
  .payment-trail {
    margin-top: 8px; padding: 8px 12px; border-radius: 8px;
    background: rgba(255,89,100,.08); border: 1px solid rgba(255,89,100,.2);
    font-size: 12.5px; color: var(--text);
    animation: slideDown .3s ease;
  }
  .payment-trail .trail-status { color: var(--scam); font-weight: 600; }
  .payment-trail.found .trail-status { color: var(--legit); }

  footer { padding: 14px 20px 18px; background: var(--panel); border-top: 1px solid var(--line); }
  .samples { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .samples button {
    font-size: 12px; padding: 5px 11px; border-radius: 999px; cursor: pointer;
    background: var(--panel-2); color: var(--muted); border: 1px solid var(--line);
  }
  .samples button:hover { color: var(--text); border-color: var(--accent); }
  .inputrow { display: flex; gap: 10px; }
  select, textarea, .send {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
    border-radius: 10px; font: inherit;
  }
  select { padding: 0 10px; }
  textarea { flex: 1; padding: 10px 14px; resize: none; height: 66px; }
  textarea:focus { outline: none; border-color: var(--accent); }
  .send { padding: 0 22px; cursor: pointer; background: var(--accent); color: #fff; border: none; font-weight: 600; }
  .send:disabled { opacity: .5; cursor: wait; }
</style>
</head>
<body>
<header>
  <span class="logo">🛡️</span>
  <div>
    <h1>Aegis Fraud Shield</h1>
    <div class="sub">Paste or read out any message / call script — watch it get checked live</div>
  </div>
  <span id="status">connecting…</span>
</header>

<div id="log"></div>

<footer>
  <div class="samples" id="samples"></div>
  <div class="inputrow">
    <select id="source">
      <option value="manual_demo">demo</option>
      <option value="sms">sms</option>
      <option value="call_transcript">call</option>
      <option value="whatsapp">whatsapp</option>
      <option value="email">email</option>
    </select>
    <input type="hidden" id="gpsLat">
    <input type="hidden" id="gpsLon">
    <input type="hidden" id="gpsDistrict">
    <textarea id="text" placeholder="Type or paste the message here… (Enter to send, Shift+Enter for newline)"></textarea>
    <button class="send" id="send">Check</button>
  </div>
</footer>

<script>
const SAMPLES = [
  ["🚨 Digital-arrest call", "call_transcript", "This is Inspector Sharma from CBI. An FIR has been registered against your Aadhaar for money laundering. Stay on this video call and do not disconnect. Transfer the verification amount in USDT immediately or a warrant will be issued."],
  ["📱 KYC scam SMS", "sms", "Dear customer your SBI account KYC has expired. Account will be blocked within 24 hours. Update immediately at bit.ly/kyc-upd8 to avoid suspension."],
  ["🎰 Lottery bait", "whatsapp", "Congratulations! Your mobile number has won Rs 25,00,000 in the KBC Lucky Draw. To claim your prize deposit the processing fee of Rs 12,500 and share your bank details."],
  ["✅ Genuine OTP", "sms", "482913 is your OTP for HDFC net banking login. Valid for 10 minutes. Do not share this OTP with anyone."],
  ["💬 Normal chat", "whatsapp", "Hey, are we still meeting for lunch tomorrow at 1pm? Let me know if you want to move it."],
];

const log = document.getElementById("log");
const input = document.getElementById("text");
const sendBtn = document.getElementById("send");
const sourceSel = document.getElementById("source");
const gpsLat = document.getElementById("gpsLat");
const gpsLon = document.getElementById("gpsLon");
const gpsDistrict = document.getElementById("gpsDistrict");
const statusEl = document.getElementById("status");

// Command centre to auto-ingest detections into (dashboard + fusion).
const COMMAND_CENTRE = "http://127.0.0.1:8000";
// Demo geography shared with fraud-graph + fusion (see fusion/correlator.py).
const DISTRICT_COORDS = {
  // Jamtara town centre. 23.79 fell ~19 km south, on Maithon reservoir.
  "Jamtara": [23.963, 86.804], "Deoghar": [24.48, 86.70], "Alwar": [27.55, 76.63],
  "Bharatpur": [27.22, 77.49], "Nuh": [28.10, 77.00], "Chennai Central": [13.08, 80.27],
  "Mumbai South": [18.93, 72.83], "Delhi East": [28.65, 77.30],
};

const VERDICT_COLOR = { scam: "var(--scam)", suspicious: "var(--suspicious)", legit: "var(--legit)" };

fetch("/health").then(r => r.json()).then(h => {
  statusEl.textContent = h.model_trained ? "model ready" : "model NOT trained";
  if (h.model_trained) statusEl.classList.add("ok");
}).catch(() => { statusEl.textContent = "api offline"; });

for (const [label, source, text] of SAMPLES) {
  const b = document.createElement("button");
  b.textContent = label;
  b.onclick = () => { input.value = text; sourceSel.value = source; input.focus(); };
  document.getElementById("samples").appendChild(b);
}

function bubble(cls, html) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerHTML = html;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  return div;
}

const esc = s => s.replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

async function requestLocation() {
  if (gpsLat.value) return; // already have it
  return new Promise(resolve => {
    navigator.geolocation.getCurrentPosition(
      pos => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        gpsLat.value = lat;
        gpsLon.value = lon;
        let bestDist = "Unknown District";
        let minD = Infinity;
        for (const [d, coords] of Object.entries(DISTRICT_COORDS)) {
          const dist = Math.hypot(lat - coords[0], lon - coords[1]);
          if (dist < minD) { minD = dist; bestDist = d; }
        }
        if (minD > 2.0) bestDist = "Current Location";
        gpsDistrict.value = bestDist;
        resolve(true);
      },
      err => { resolve(false); }
    );
  });
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  bubble("user", esc(text));
  input.value = "";
  sendBtn.disabled = true;
  const thinking = bubble("bot", "Analysing…");
  try {
    await requestLocation();
    
    let location_hint = null;
    if (gpsLat.value && gpsLon.value) {
      location_hint = { district: gpsDistrict.value, lat: parseFloat(gpsLat.value), lon: parseFloat(gpsLon.value) };
    }
    const resp = await fetch("/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, source: sourceSel.value, location_hint }),
    });
    if (!resp.ok) throw new Error((await resp.json()).detail || resp.statusText);
    const r = await resp.json();
    // Fire-and-forget hand-off: the dashboard + fusion see this detection
    // live. Failure is non-fatal — the local demo keeps working regardless.
    let relayed = false;
    if (r.verdict !== 'legit') {
      try {
        const ing = await fetch(`${COMMAND_CENTRE}/ingest/scam`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(r),
        });
        relayed = ing.ok;
      } catch { /* command centre offline — fine */ }
    }
    const pct = Math.round(r.risk_score * 100);
    const color = VERDICT_COLOR[r.verdict];
    const isScammy = r.verdict === 'scam' || r.verdict === 'suspicious';
    const formId = 'pf_' + r.event_id;
    thinking.innerHTML = `
      <span class="verdict ${r.verdict}">${r.verdict}</span>
      <div class="riskbar"><div style="width:${pct}%;background:${color}"></div></div>
      <div class="meta">risk ${pct}% · type: ${esc(r.scam_type)} · ${esc(r.event_id)}${relayed ? " · ⇢ command centre" : ""}</div>
      ${r.markers.length ? `<div class="chips">${r.markers.map(m => `<span class="chip">${esc(m)}</span>`).join("")}</div>` : ""}
      <div class="explain">${esc(r.explanation)}</div>
      ${isScammy ? `
        <button class="report-payment-btn" id="rpb_${formId}" onclick="togglePaymentForm('${formId}')">
          💰 Report Payment — Did you pay?
        </button>
        <div class="payment-form" id="${formId}">
          <div class="form-row">
            <div>
              <label>Amount paid (₹)</label>
              <input type="number" id="amt_${formId}" placeholder="e.g. 49999" min="1" step="1">
            </div>
            <div>
              <label>Method</label>
              <select id="method_${formId}">
                <option value="upi">UPI</option>
                <option value="bank_transfer">Bank Transfer</option>
                <option value="cash">Cash</option>
                <option value="giftcard">Gift Card</option>
                <option value="crypto">Crypto</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div>
              <button class="submit-payment" onclick="submitPayment('${formId}', '${r.event_id}')">Trace Money →</button>
            </div>
          </div>
        </div>
        <div id="trail_${formId}"></div>
      ` : ''}`;
    // Store the result so we can attach payment info later
    if (isScammy) window['_scam_' + r.event_id] = r;
  } catch (e) {
    thinking.innerHTML = `<span style="color:var(--scam)">Error:</span> ${esc(String(e.message || e))}`;
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

sendBtn.onclick = send;
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

function togglePaymentForm(formId) {
  const form = document.getElementById(formId);
  form.classList.toggle('open');
  if (form.classList.contains('open')) {
    const amtInput = document.getElementById('amt_' + formId);
    if (amtInput) amtInput.focus();
  }
}

// ESC closes any open payment form
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.payment-form.open').forEach(f => f.classList.remove('open'));
  }
});

async function submitPayment(formId, eventId) {
  const amtInput = document.getElementById('amt_' + formId);
  const methodSel = document.getElementById('method_' + formId);
  const trailDiv = document.getElementById('trail_' + formId);
  const btn = document.getElementById('rpb_' + formId);
  const amount = parseFloat(amtInput.value);
  if (!amount || amount <= 0) { amtInput.style.borderColor = 'var(--scam)'; return; }

  const method = methodSel.value;
  const stored = window['_scam_' + eventId];
  if (!stored) return;

  // Attach reported_payment to the scam event
  stored.reported_payment = { amount, method };

  // Update button
  btn.innerHTML = `✅ Reported ₹${amount.toLocaleString('en-IN')} via ${method}`;
  btn.classList.add('done');
  document.getElementById(formId).classList.remove('open');

  // Show "tracing..." message
  trailDiv.innerHTML = '<div class="payment-trail"><span class="trail-status">🔍 Tracing payment through fraud rings…</span></div>';

  // Re-send to command centre with payment info
  try {
    const resp = await fetch(`${COMMAND_CENTRE}/ingest/scam`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(stored),
    });
    if (resp.ok) {
      // Force the command centre to re-run fusion with the new payment data
      try {
        const fusionResp = await fetch(`${COMMAND_CENTRE}/fuse`, { method: 'POST' });
        if (fusionResp.ok) {
          const fusion = await fusionResp.json();
          const trails = fusion.money_trails || [];
          const match = trails.find(t => t.scam_event_id === eventId);
          if (match) {
            trailDiv.innerHTML = `<div class="payment-trail found">
              <span class="trail-status">💰 MONEY TRAIL FOUND</span><br>
              ₹${amount.toLocaleString('en-IN')} traced → account <b>${esc(match.account_id)}</b>
              in ring <b>${esc(match.ring_id)}</b>${match.district ? ' (' + esc(match.district) + ')' : ''}
            </div>`;
          } else {
            trailDiv.innerHTML = `<div class="payment-trail">
              <span class="trail-status">⇢ Payment reported to command centre</span><br>
              No matching ring transaction found yet — investigators notified.
            </div>`;
          }
        }
      } catch { /* fusion endpoint unavailable */ }
    } else {
      trailDiv.innerHTML = `<div class="payment-trail">
        <span class="trail-status">⇢ Payment reported</span><br>
        Command centre offline — payment saved locally for later relay.
      </div>`;
    }
  } catch {
    trailDiv.innerHTML = `<div class="payment-trail">
      <span class="trail-status">⇢ Payment recorded</span><br>
      Command centre offline — will relay when available.
    </div>`;
  }
}
</script>
</body>
</html>
